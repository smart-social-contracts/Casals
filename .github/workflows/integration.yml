# Manually-triggered integration test: spins up a local replica with icp-cli,
# builds + deploys the Casals backend, and runs the integration suite.
#
# Trigger from the GitHub UI (Actions ▸ Integration ▸ Run workflow) or via:
#   gh workflow run integration.yml
name: Integration (local replica)

on:
  workflow_dispatch:
    inputs:
      verbose:
        description: "pytest -v"
        type: boolean
        default: true

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install icp-cli + ic-wasm
        run: npm install -g @icp-sdk/icp-cli @icp-sdk/ic-wasm

      - name: Install backend / test dependencies
        run: pip install -r requirements-dev.txt

      - name: Show toolchain versions
        run: |
          icp --version || true
          python3 -m basilisk --version || true

      # conftest.py starts the local replica, builds + deploys casals_backend,
      # and for the e2e suite deploys a real file-registry (from the committed
      # tests/fixtures/ic_file_registry.wasm.gz) on the same replica, then drives
      # the full create/upgrade/snapshot/rollback lifecycle. The replica is
      # stopped on teardown.
      - name: Run tests (unit + integration + e2e)
        run: pytest tests/ ${{ inputs.verbose && '-v' || '' }}

      - name: Stop local replica (safety net)
        if: always()
        run: icp network stop || true
