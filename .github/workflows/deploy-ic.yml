# Manually-triggered deploy of the Casals instance to the IC mainnet.
#
# Trigger from the GitHub UI (Actions ▸ Deploy to IC mainnet ▸ Run workflow)
# or via: gh workflow run deploy-ic.yml -f commit_sha=<sha> -f mode=upgrade
#
# Requirements:
#   - Repo secret CASALS_IDENTITY_PEM: the PEM of the `casals` deploy identity
#     (principal kem77-…-xqe). The identity must hold cycles on mainnet.
#   - .icp/data (committed) holds the mainnet canister-ID mappings so each run
#     targets the SAME canisters instead of creating new ones.
#
# Conductor principal: added as a controller of casals_backend and
# casals_frontend after every deploy so the conductor can manage the instance
# (e.g. set commanders, call admin endpoints) from the Casals UI without
# needing the deploy PEM.
CONDUCTOR_PRINCIPAL: nxz44-phem5-dkqap-2tvim-krdel-r2grb-losd6-6suw2-pu6sc-25jte-aae
name: Deploy to IC mainnet

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (blank = latest main)"
        type: string
        required: false
        default: ""
      mode:
        description: "Install mode (reinstall WIPES backend + registry state)"
        type: choice
        options:
          - upgrade
          - reinstall
        default: upgrade
      seed:
        description: "Seed the template catalog (upload + authorize WASMs) after deploy"
        type: boolean
        default: false
      deploy_sheet:
        description: "Also deploy the live sheet (stand up the orchestra; creates/reuses canisters)"
        type: boolean
        default: false

# Never run two mainnet deploys at once.
concurrency:
  group: deploy-ic
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve ref to deploy
        id: ref
        run: |
          REF="${{ inputs.commit_sha }}"
          if [ -z "$REF" ]; then REF="main"; fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Deploying ref: $REF (mode: ${{ inputs.mode }})"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.ref.outputs.ref }}
          # file_registry is a (public) submodule — fetch it for the build.
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install icp-cli + ic-wasm
        run: npm install -g @icp-sdk/icp-cli @icp-sdk/ic-wasm

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Import deploy identity
        env:
          CASALS_IDENTITY_PEM: ${{ secrets.CASALS_IDENTITY_PEM }}
        run: |
          if [ -z "$CASALS_IDENTITY_PEM" ]; then
            echo "::error::CASALS_IDENTITY_PEM secret is not set"; exit 1
          fi
          umask 077
          printf '%s' "$CASALS_IDENTITY_PEM" > /tmp/casals_identity.pem
          icp identity import casals --from-pem /tmp/casals_identity.pem --storage plaintext
          echo "Deploy principal: $(icp identity principal --identity casals)"
          echo "Cycles balance:   $(icp cycles balance --identity casals -e ic || true)"

      - name: Build backend + registry WASMs
        run: make build

      - name: Deploy to IC mainnet
        run: icp deploy -e ic --identity casals --mode ${{ inputs.mode }} -y

      - name: Add conductor as controller
        env:
          CONDUCTOR: nxz44-phem5-dkqap-2tvim-krdel-r2grb-losd6-6suw2-pu6sc-25jte-aae
        run: |
          echo "Adding conductor $CONDUCTOR as controller of casals_backend and casals_frontend"
          icp canister settings update casals_backend \
            --add-controller "$CONDUCTOR" \
            -e ic --identity casals -f
          icp canister settings update casals_frontend \
            --add-controller "$CONDUCTOR" \
            -e ic --identity casals -f
          echo "Conductor added successfully"

      - name: Seed catalog (upload + authorize template WASMs)
        if: ${{ inputs.seed || inputs.deploy_sheet }}
        run: |
          python3 scripts/seed.py -e ic --identity casals \
            ${{ inputs.deploy_sheet && '--deploy' || '' }}

      - name: Report deployed canisters
        if: always()
        run: icp canister list -e ic --identity casals || true

      - name: Remove identity material
        if: always()
        run: rm -f /tmp/casals_identity.pem