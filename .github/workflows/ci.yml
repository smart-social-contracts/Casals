# Fast, replica-free checks that run on every pull request and on pushes to
# main. The heavier integration / e2e suite (which spins up a local replica) is
# kept in integration.yml as a manual workflow.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install pytest

      # tests/test_unit.py covers all pure helpers with no IC runtime needed:
      #   util    — canister URLs, audit hash chain, cycles policy/top-up
      #   auth    — PERMISSIONS table, _parse/_normalize/_has_permission
      #   wasm_helpers — _split_key, _ver_tuple, _family_of
      #   views   — _canister_view, _stand_view, _section_view
      - name: Run unit tests
        run: pytest tests/test_unit.py -v

  cli-unit:
    name: CLI unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pytest
        run: pip install pytest

      # tests/test_cli_unit.py covers scripts/casals.py with no IC runtime:
      # _parse / _candid_unescape / _candid_text_arg helpers, the arg parser,
      # _load_sheet_file, call() subprocess wiring (mocked), error exit codes,
      # and a full subprocess suite using a pure-Python fake icp binary.
      - name: Run CLI unit tests
        run: pytest tests/test_cli_unit.py -v

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      # A successful production build type-checks the SvelteKit app, including
      # the Cycles page and the cycles bindings in lib/api.ts.
      - name: Build frontend
        run: npm --prefix frontend run build

  orchestration-unit:
    name: Orchestration unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      # Baton + Multisig pure helpers (no local replica). Each package is
      # pytest-run from its own directory — both ship tests/test_unit.py.
      - name: Run orchestration unit tests
        run: make -C packages/orchestration test-unit
