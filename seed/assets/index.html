<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello from Casals</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(120% 120% at 50% 0%, #1e293b, #0f172a);
        color: #e2e8f0;
      }
      .card {
        text-align: center;
        padding: 3rem 3.5rem;
        border-radius: 1rem;
        background: rgba(148, 163, 184, 0.08);
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        max-width: 22rem;
      }
      h1 { margin: 0 0 0.5rem; font-size: 2rem; min-height: 2.4rem; }
      p { margin: 0.25rem 0; color: #94a3b8; }
      code { color: #7dd3fc; }
      .row {
        display: flex;
        gap: 0.5rem;
        margin: 1.5rem 0 0.5rem;
      }
      input {
        flex: 1;
        padding: 0.6rem 0.8rem;
        border-radius: 0.6rem;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: rgba(15, 23, 42, 0.6);
        color: #e2e8f0;
        font-size: 1rem;
      }
      input:focus { outline: 2px solid #38bdf8; }
      button {
        padding: 0.6rem 1.1rem;
        border-radius: 0.6rem;
        border: 0;
        background: #38bdf8;
        color: #0f172a;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
      }
      button:hover { background: #7dd3fc; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 id="greeting">Hello, World 👋</h1>
      <p>Served by a DFINITY certified assets canister.</p>
      <p>Provisioned and managed by <code>Casals</code>.</p>
      <div class="row">
        <input id="name" type="text" placeholder="Your name" autocomplete="off" />
        <button id="go">Greet</button>
      </div>
    </div>
    <script>
      (function () {
        var input = document.getElementById("name");
        var greeting = document.getElementById("greeting");
        function greet() {
          var name = (input.value || "").trim();
          greeting.textContent = name ? "Hello, " + name + " 👋" : "Hello, World 👋";
        }
        document.getElementById("go").addEventListener("click", greet);
        input.addEventListener("keydown", function (e) {
          if (e.key === "Enter") greet();
        });
      })();
    </script>
  </body>
</html>
