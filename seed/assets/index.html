<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello from Casals</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(120% 120% at 50% 0%, #1e293b, #0f172a);
        color: #e2e8f0;
      }
      .card {
        text-align: center;
        padding: 3rem 3.5rem;
        border-radius: 1rem;
        background: rgba(148, 163, 184, 0.08);
        border: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      h1 { margin: 0 0 0.5rem; font-size: 2rem; }
      p { margin: 0.25rem 0; color: #94a3b8; }
      code { color: #7dd3fc; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Hello, World 👋</h1>
      <p>Served by a DFINITY certified assets canister.</p>
      <p>Provisioned and managed by <code>Casals</code>.</p>
    </div>
  </body>
</html>
