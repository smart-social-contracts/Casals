# yaml-language-server: $schema=https://github.com/dfinity/icp-cli/raw/refs/tags/v0.1.0/docs/schemas/icp-yaml-schema.json
#
# Casals is deployed with icp-cli (dfx is not used).
# The Basilisk backend WASM is built out-of-band (see `make build`) and
# installed via the prebuilt recipe; the SvelteKit frontend is built by the
# asset-canister recipe at deploy time.

canisters:
  - name: casals_backend
    recipe:
      type: "@dfinity/prebuilt@v2.0.0"
      configuration:
        path: .basilisk/casals_backend/casals_backend.wasm
        shrink: true
        compress: true

  # The file-registry is part of the Casals core: it stores the WASM artifacts
  # (catalog templates, project releases) that Casals installs into stands.
  # Built from file_registry/main.py by `make build` (Basilisk, like the backend).
  - name: ic_file_registry
    recipe:
      type: "@dfinity/prebuilt@v2.0.0"
      configuration:
        path: .basilisk/ic_file_registry/ic_file_registry.wasm
        shrink: true
        compress: true

  # Browse UI for the file-registry (SvelteKit). Built from the file_registry
  # submodule; VITE_CANISTER_ID is injected by `make build-registry-frontend`.
  - name: ic_file_registry_frontend
    recipe:
      type: "@dfinity/asset-canister@v2.2.0"
      configuration:
        dir: file_registry_dist
        build:
          - make build-registry-frontend

  - name: casals_frontend
    recipe:
      type: "@dfinity/asset-canister@v2.2.0"
      configuration:
        dir: dist
        build:
          - npm --prefix frontend ci
          - npm --prefix frontend run build
